<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500" font-family="Arial, sans-serif">
  <defs>
    <marker id="flowArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
    <marker id="flowArrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
    </marker>
    <pattern id="hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#d5dbdb" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a5276">Plan type d'un etablissement de tatouage / percage</text>
  <text x="350" y="44" text-anchor="middle" font-size="11" fill="#7f8c8d" font-style="italic">Principe de la marche en avant : du sale vers le propre</text>

  <!-- Outer walls -->
  <rect x="30" y="60" width="640" height="380" rx="4" fill="#fff" stroke="#2c3e50" stroke-width="3"/>

  <!-- Zone 1: Accueil (Reception) - top left -->
  <rect x="30" y="60" width="250" height="160" fill="#ebf5fb" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="55" cy="85" r="16" fill="#1a5276"/>
  <text x="55" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">1</text>
  <text x="155" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a5276">ACCUEIL</text>
  <text x="155" y="100" text-anchor="middle" font-size="10" fill="#2c3e50">Reception client</text>
  <!-- Desk -->
  <rect x="60" y="130" width="80" height="40" rx="4" fill="#d4e6f1" stroke="#1a5276" stroke-width="1.5"/>
  <text x="100" y="155" text-anchor="middle" font-size="8" fill="#1a5276">Bureau</text>
  <!-- Chair -->
  <rect x="160" y="150" width="30" height="30" rx="15" fill="#d4e6f1" stroke="#1a5276" stroke-width="1"/>
  <text x="175" y="169" text-anchor="middle" font-size="7" fill="#1a5276">Chaise</text>
  <!-- Waiting area -->
  <rect x="60" y="180" width="60" height="20" rx="3" fill="#aed6f1" stroke="#1a5276" stroke-width="1"/>
  <text x="90" y="193" text-anchor="middle" font-size="7" fill="#1a5276">Attente</text>
  <!-- Entry door -->
  <rect x="30" y="130" width="5" height="40" fill="#27ae60"/>
  <text x="18" y="155" text-anchor="middle" font-size="8" fill="#27ae60" transform="rotate(-90,18,155)">ENTREE</text>

  <!-- Zone 5: Sanitaires (bottom left) -->
  <rect x="30" y="220" width="250" height="110" fill="#f5eef8" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="55" cy="245" r="16" fill="#8e44ad"/>
  <text x="55" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">5</text>
  <text x="155" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#8e44ad">SANITAIRES</text>
  <!-- Toilet -->
  <rect x="60" y="265" width="35" height="35" rx="4" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="78" y="287" text-anchor="middle" font-size="7" fill="#8e44ad">WC</text>
  <!-- Sink -->
  <rect x="110" y="270" width="30" height="25" rx="12" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="125" y="287" text-anchor="middle" font-size="7" fill="#8e44ad">Lavabo</text>
  <!-- PHA -->
  <rect x="160" y="275" width="40" height="20" rx="3" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
  <text x="180" y="289" text-anchor="middle" font-size="7" fill="#8e44ad">PHA</text>

  <!-- Zone 4: Stockage (bottom right) -->
  <rect x="30" y="330" width="250" height="110" fill="#fef9e7" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="55" cy="355" r="16" fill="#f39c12"/>
  <text x="55" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">4</text>
  <text x="155" y="358" text-anchor="middle" font-size="14" font-weight="bold" fill="#f39c12">STOCKAGE</text>
  <text x="155" y="373" text-anchor="middle" font-size="10" fill="#2c3e50">Materiel propre et sterile</text>
  <!-- Shelves -->
  <rect x="60" y="388" width="90" height="10" rx="2" fill="#fad7a0" stroke="#f39c12" stroke-width="1"/>
  <rect x="60" y="405" width="90" height="10" rx="2" fill="#fad7a0" stroke="#f39c12" stroke-width="1"/>
  <rect x="60" y="422" width="90" height="10" rx="2" fill="#fad7a0" stroke="#f39c12" stroke-width="1"/>
  <text x="105" y="397" text-anchor="middle" font-size="7" fill="#f39c12">Etageres</text>
  <!-- DASRI container -->
  <rect x="180" y="395" width="40" height="35" rx="4" fill="#f7dc6f" stroke="#f39c12" stroke-width="1.5"/>
  <text x="200" y="416" text-anchor="middle" font-size="7" fill="#f39c12">DASRI</text>

  <!-- Zone 2: Zone de travail (top right) -->
  <rect x="280" y="60" width="390" height="220" fill="#eafaf1" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="305" cy="85" r="16" fill="#27ae60"/>
  <text x="305" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">2</text>
  <text x="475" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">ZONE DE TRAVAIL</text>
  <text x="475" y="100" text-anchor="middle" font-size="10" fill="#2c3e50">Tatouage / percage</text>

  <!-- Tattoo chair -->
  <rect x="360" y="130" width="80" height="110" rx="10" fill="#a9dfbf" stroke="#27ae60" stroke-width="2"/>
  <text x="400" y="175" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">Fauteuil</text>
  <text x="400" y="188" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">client</text>
  <!-- Headrest -->
  <ellipse cx="400" cy="125" rx="25" ry="10" fill="#a9dfbf" stroke="#27ae60" stroke-width="1.5"/>

  <!-- Work table -->
  <rect x="480" y="140" width="70" height="50" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="515" y="160" text-anchor="middle" font-size="8" fill="#27ae60">Plan de</text>
  <text x="515" y="170" text-anchor="middle" font-size="8" fill="#27ae60">travail</text>
  <text x="515" y="182" text-anchor="middle" font-size="7" fill="#7f8c8d">(champ sterile)</text>

  <!-- Sharps container -->
  <rect x="490" y="210" width="35" height="30" rx="3" fill="#f7dc6f" stroke="#f39c12" stroke-width="1.5"/>
  <text x="508" y="228" text-anchor="middle" font-size="6" fill="#f39c12">PCT</text>

  <!-- Hand wash station -->
  <rect x="570" y="130" width="60" height="45" rx="6" fill="#d4e6f1" stroke="#1a5276" stroke-width="1.5"/>
  <text x="600" y="150" text-anchor="middle" font-size="7" fill="#1a5276">Lavabo</text>
  <text x="600" y="162" text-anchor="middle" font-size="7" fill="#1a5276">mains</text>

  <!-- Light -->
  <circle cx="310" cy="180" r="15" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="310" y="184" text-anchor="middle" font-size="7" fill="#f39c12">Eclai.</text>

  <!-- PHA dispenser -->
  <rect x="570" y="200" width="40" height="25" rx="3" fill="#d4e6f1" stroke="#1a5276" stroke-width="1"/>
  <text x="590" y="216" text-anchor="middle" font-size="7" fill="#1a5276">PHA</text>

  <!-- Zone 3: Sterilisation (bottom right) -->
  <rect x="280" y="280" width="390" height="160" fill="#fdf2e9" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="305" cy="305" r="16" fill="#e67e22"/>
  <text x="305" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">3</text>
  <text x="475" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#e67e22">STERILISATION</text>
  <text x="475" y="320" text-anchor="middle" font-size="10" fill="#2c3e50">Zone sale vers zone propre</text>

  <!-- Dirty sub-zone -->
  <rect x="295" y="335" width="150" height="90" rx="6" fill="#e74c3c" opacity="0.08" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="370" y="350" text-anchor="middle" font-size="9" font-weight="bold" fill="#e74c3c">ZONE SALE</text>
  <!-- Pre-desinfection bac -->
  <rect x="310" y="358" width="60" height="30" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="340" y="377" text-anchor="middle" font-size="7" fill="#e74c3c">Bac pre-</text>
  <text x="340" y="387" text-anchor="middle" font-size="7" fill="#e74c3c">desinfect.</text>
  <!-- Ultrasonic -->
  <rect x="380" y="358" width="50" height="30" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="405" y="377" text-anchor="middle" font-size="7" fill="#e74c3c">Ultrasons</text>

  <!-- Arrow dirty to clean -->
  <line x1="450" y1="380" x2="480" y2="380" stroke="#27ae60" stroke-width="2.5" marker-end="url(#flowArr)"/>

  <!-- Clean sub-zone -->
  <rect x="485" y="335" width="170" height="90" rx="6" fill="#27ae60" opacity="0.08" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="570" y="350" text-anchor="middle" font-size="9" font-weight="bold" fill="#27ae60">ZONE PROPRE</text>
  <!-- Autoclave -->
  <rect x="500" y="358" width="65" height="35" rx="5" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="533" y="377" text-anchor="middle" font-size="7" fill="#27ae60" font-weight="bold">Autoclave</text>
  <text x="533" y="387" text-anchor="middle" font-size="7" fill="#27ae60">134 °C</text>
  <!-- Packaging -->
  <rect x="580" y="358" width="60" height="35" rx="5" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="610" y="377" text-anchor="middle" font-size="7" fill="#27ae60">Condition-</text>
  <text x="610" y="387" text-anchor="middle" font-size="7" fill="#27ae60">nement</text>

  <!-- Marche en avant (forward flow) arrows -->
  <!-- From accueil to work zone -->
  <path d="M270,140 L290,140" fill="none" stroke="#27ae60" stroke-width="2.5" marker-end="url(#flowArr)"/>

  <!-- From work zone to sterilisation -->
  <path d="M475,275 L475,290" fill="none" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#flowArrRed)"/>
  <text x="490" y="287" font-size="8" fill="#e74c3c">sale</text>

  <!-- From sterilisation back to stockage -->
  <path d="M485,430 L285,430" fill="none" stroke="#27ae60" stroke-width="2.5" marker-end="url(#flowArr)"/>
  <text x="385" y="425" font-size="8" fill="#27ae60">propre/sterile</text>

  <!-- From stockage to work zone -->
  <path d="M275,380 Q290,380 290,270 L290,230" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#flowArr)"/>

  <!-- Legend -->
  <rect x="30" y="455" width="640" height="30" rx="5" fill="#f8f9fa" stroke="#d5dbdb" stroke-width="1"/>
  <line x1="50" y1="472" x2="80" y2="472" stroke="#27ae60" stroke-width="2.5" marker-end="url(#flowArr)"/>
  <text x="92" y="476" font-size="9" fill="#2c3e50">Flux propre</text>
  <line x1="180" y1="472" x2="210" y2="472" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#flowArrRed)"/>
  <text x="222" y="476" font-size="9" fill="#2c3e50">Flux sale</text>
  <text x="350" y="476" font-size="9" fill="#1a5276" font-weight="bold">Marche en avant : jamais de croisement sale / propre</text>
</svg>