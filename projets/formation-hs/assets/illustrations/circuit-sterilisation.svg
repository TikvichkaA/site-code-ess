<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" width="700" height="250" font-family="Arial, sans-serif">
  <defs>
    <marker id="flowArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a5276"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a5276">Circuit de sterilisation</text>
  <text x="350" y="42" text-anchor="middle" font-size="11" fill="#7f8c8d" font-style="italic">Marche en avant : du plus souille au plus propre</text>

  <!-- Flow direction arrow background -->
  <rect x="30" y="105" width="640" height="6" rx="3" fill="#d5dbdb"/>
  <polygon points="670,108 680,108 675,100" fill="#d5dbdb"/>

  <!-- Step 1 -->
  <g transform="translate(50,65)">
    <circle cx="0" cy="45" r="28" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="0" cy="45" r="20" fill="#e74c3c"/>
    <text x="0" y="50" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">1</text>
    <text x="0" y="100" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Pre-</text>
    <text x="0" y="113" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">desinfection</text>
    <text x="0" y="130" text-anchor="middle" font-size="8" fill="#7f8c8d">Immersion</text>
    <text x="0" y="140" text-anchor="middle" font-size="8" fill="#7f8c8d">bac enzymatique</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="82" y1="110" x2="110" y2="110" stroke="#1a5276" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 2 -->
  <g transform="translate(145,65)">
    <circle cx="0" cy="45" r="28" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
    <circle cx="0" cy="45" r="20" fill="#f39c12"/>
    <text x="0" y="50" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">2</text>
    <text x="0" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Rincage</text>
    <text x="0" y="130" text-anchor="middle" font-size="8" fill="#7f8c8d">Eau courante</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="177" y1="110" x2="205" y2="110" stroke="#1a5276" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 3 -->
  <g transform="translate(245,65)">
    <circle cx="0" cy="45" r="28" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
    <circle cx="0" cy="45" r="20" fill="#f39c12"/>
    <text x="0" y="50" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">3</text>
    <text x="0" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Nettoyage</text>
    <text x="0" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">ultrasons</text>
    <text x="0" y="135" text-anchor="middle" font-size="8" fill="#7f8c8d">Bac a ultrasons</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="277" y1="110" x2="305" y2="110" stroke="#1a5276" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 4 -->
  <g transform="translate(345,65)">
    <circle cx="0" cy="45" r="28" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="2"/>
    <circle cx="0" cy="45" r="20" fill="#3498db"/>
    <text x="0" y="50" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">4</text>
    <text x="0" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Rincage</text>
    <text x="0" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">eau osmosee</text>
    <text x="0" y="135" text-anchor="middle" font-size="8" fill="#7f8c8d">Eau demineralisee</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="377" y1="110" x2="405" y2="110" stroke="#1a5276" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 5 -->
  <g transform="translate(445,65)">
    <circle cx="0" cy="45" r="28" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
    <circle cx="0" cy="45" r="20" fill="#27ae60"/>
    <text x="0" y="50" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">5</text>
    <text x="0" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Sechage</text>
    <text x="0" y="130" text-anchor="middle" font-size="8" fill="#7f8c8d">Champ propre</text>
    <text x="0" y="140" text-anchor="middle" font-size="8" fill="#7f8c8d">non tisse</text>
  </g>

  <!-- Arrow 5→6 -->
  <line x1="477" y1="110" x2="505" y2="110" stroke="#1a5276" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 6 -->
  <g transform="translate(545,65)">
    <circle cx="0" cy="45" r="28" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
    <circle cx="0" cy="45" r="20" fill="#27ae60"/>
    <text x="0" y="50" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">6</text>
    <text x="0" y="100" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Condition-</text>
    <text x="0" y="113" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">nement</text>
    <text x="0" y="130" text-anchor="middle" font-size="8" fill="#7f8c8d">Sachets scelles</text>
    <text x="0" y="140" text-anchor="middle" font-size="8" fill="#7f8c8d">+ indicateur</text>
  </g>

  <!-- Arrow 6→7 -->
  <line x1="577" y1="110" x2="605" y2="110" stroke="#1a5276" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 7 -->
  <g transform="translate(645,65)">
    <circle cx="0" cy="45" r="28" fill="#1a5276" opacity="0.15" stroke="#1a5276" stroke-width="2"/>
    <circle cx="0" cy="45" r="20" fill="#1a5276"/>
    <text x="0" y="50" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">7</text>
    <text x="0" y="105" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c3e50">Autoclave</text>
    <text x="0" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">134 °C</text>
    <text x="0" y="135" text-anchor="middle" font-size="8" fill="#7f8c8d">Cycle B</text>
    <text x="0" y="145" text-anchor="middle" font-size="8" fill="#7f8c8d">18 min</text>
  </g>

  <!-- Zone labels -->
  <rect x="30" y="195" width="200" height="24" rx="4" fill="#e74c3c" opacity="0.1" stroke="#e74c3c" stroke-width="1"/>
  <text x="130" y="211" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">ZONE SALE</text>

  <rect x="260" y="195" width="170" height="24" rx="4" fill="#f39c12" opacity="0.1" stroke="#f39c12" stroke-width="1"/>
  <text x="345" y="211" text-anchor="middle" font-size="10" font-weight="bold" fill="#f39c12">ZONE INTERMEDIAIRE</text>

  <rect x="460" y="195" width="210" height="24" rx="4" fill="#27ae60" opacity="0.1" stroke="#27ae60" stroke-width="1"/>
  <text x="565" y="211" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">ZONE PROPRE / STERILE</text>

  <!-- Gradient arrow at bottom -->
  <defs>
    <linearGradient id="zoneGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="50%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
  </defs>
  <rect x="30" y="228" width="640" height="5" rx="2" fill="url(#zoneGrad)"/>
  <text x="30" y="245" font-size="9" fill="#e74c3c">Souille</text>
  <text x="655" y="245" font-size="9" fill="#27ae60" text-anchor="end">Sterile</text>
</svg>