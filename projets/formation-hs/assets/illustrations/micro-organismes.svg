<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400" font-family="Arial, sans-serif">

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a5276">Classification des micro-organismes</text>
  <text x="350" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d" font-style="italic">Risques infectieux en tatouage et percage</text>

  <!-- Table header -->
  <rect x="20" y="58" width="660" height="32" rx="6" fill="#1a5276"/>
  <text x="85" y="79" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Type</text>
  <text x="220" y="79" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Caracteristiques</text>
  <text x="400" y="79" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Exemples</text>
  <text x="570" y="79" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Resistance</text>
  <!-- Column separators in header -->
  <line x1="140" y1="62" x2="140" y2="86" stroke="#2980b9" stroke-width="1"/>
  <line x1="300" y1="62" x2="300" y2="86" stroke="#2980b9" stroke-width="1"/>
  <line x1="500" y1="62" x2="500" y2="86" stroke="#2980b9" stroke-width="1"/>

  <!-- Row 1: Bacteries -->
  <rect x="20" y="92" width="660" height="58" rx="0" fill="#fef9e7" stroke="#d5dbdb" stroke-width="1"/>
  <!-- Icon -->
  <g transform="translate(50,115)">
    <ellipse cx="0" cy="0" rx="14" ry="8" fill="#f39c12" opacity="0.3" stroke="#f39c12" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="10" ry="5" fill="#f39c12" opacity="0.5"/>
    <!-- Flagella -->
    <path d="M14,0 Q20,5 26,-2 Q32,5 38,0" fill="none" stroke="#f39c12" stroke-width="1"/>
  </g>
  <text x="85" y="118" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">Bacteries</text>
  <text x="85" y="132" text-anchor="middle" font-size="9" fill="#7f8c8d">Procaryotes</text>
  <!-- Characteristics -->
  <text x="150" y="112" font-size="9" fill="#2c3e50">Unicellulaires, procaryotes</text>
  <text x="150" y="125" font-size="9" fill="#2c3e50">Multiplication rapide</text>
  <text x="150" y="138" font-size="9" fill="#2c3e50">Certaines forment des spores</text>
  <!-- Examples -->
  <text x="310" y="112" font-size="9" fill="#e74c3c" font-weight="bold">Staphylococcus aureus</text>
  <text x="310" y="125" font-size="9" fill="#e74c3c" font-weight="bold">Streptococcus pyogenes</text>
  <text x="310" y="138" font-size="9" fill="#2c3e50">Pseudomonas aeruginosa</text>
  <!-- Resistance -->
  <text x="510" y="112" font-size="9" fill="#2c3e50">Formes vegetatives :</text>
  <text x="510" y="125" font-size="9" fill="#27ae60" font-weight="bold">sensibles</text>
  <text x="510" y="138" font-size="9" fill="#2c3e50">Spores : tres resistantes</text>

  <!-- Row 2: Virus -->
  <rect x="20" y="152" width="660" height="58" rx="0" fill="#fdedec" stroke="#d5dbdb" stroke-width="1"/>
  <!-- Icon -->
  <g transform="translate(50,175)">
    <circle cx="0" cy="0" r="10" fill="#e74c3c" opacity="0.3" stroke="#e74c3c" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#e74c3c" opacity="0.5"/>
    <!-- Spikes -->
    <line x1="0" y1="-10" x2="0" y2="-15" stroke="#e74c3c" stroke-width="1"/>
    <line x1="7" y1="-7" x2="11" y2="-11" stroke="#e74c3c" stroke-width="1"/>
    <line x1="10" y1="0" x2="15" y2="0" stroke="#e74c3c" stroke-width="1"/>
    <line x1="7" y1="7" x2="11" y2="11" stroke="#e74c3c" stroke-width="1"/>
    <line x1="0" y1="10" x2="0" y2="15" stroke="#e74c3c" stroke-width="1"/>
    <line x1="-7" y1="7" x2="-11" y2="11" stroke="#e74c3c" stroke-width="1"/>
    <line x1="-10" y1="0" x2="-15" y2="0" stroke="#e74c3c" stroke-width="1"/>
    <line x1="-7" y1="-7" x2="-11" y2="-11" stroke="#e74c3c" stroke-width="1"/>
  </g>
  <text x="85" y="178" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">Virus</text>
  <text x="85" y="192" text-anchor="middle" font-size="9" fill="#7f8c8d">Acaryotes</text>
  <!-- Characteristics -->
  <text x="150" y="172" font-size="9" fill="#2c3e50">Parasites obligatoires</text>
  <text x="150" y="185" font-size="9" fill="#2c3e50">ADN ou ARN</text>
  <text x="150" y="198" font-size="9" fill="#2c3e50">Tres petite taille (nm)</text>
  <!-- Examples -->
  <text x="310" y="172" font-size="9" fill="#e74c3c" font-weight="bold">VHB (hepatite B)</text>
  <text x="310" y="185" font-size="9" fill="#e74c3c" font-weight="bold">VHC (hepatite C)</text>
  <text x="310" y="198" font-size="9" fill="#e74c3c" font-weight="bold">VIH (SIDA)</text>
  <!-- Resistance -->
  <text x="510" y="172" font-size="9" fill="#2c3e50">Variable selon type</text>
  <text x="510" y="185" font-size="9" fill="#e74c3c" font-weight="bold">VHB tres resistant</text>
  <text x="510" y="198" font-size="9" fill="#2c3e50">Survie sur surfaces</text>

  <!-- Row 3: Champignons -->
  <rect x="20" y="212" width="660" height="58" rx="0" fill="#eafaf1" stroke="#d5dbdb" stroke-width="1"/>
  <!-- Icon -->
  <g transform="translate(50,235)">
    <ellipse cx="0" cy="5" rx="12" ry="8" fill="#27ae60" opacity="0.3" stroke="#27ae60" stroke-width="1.5"/>
    <!-- Hyphae -->
    <path d="M0,-3 Q-5,-10 -2,-15" fill="none" stroke="#27ae60" stroke-width="1.5"/>
    <path d="M0,-3 Q5,-12 8,-15" fill="none" stroke="#27ae60" stroke-width="1.5"/>
    <circle cx="-2" cy="-15" r="3" fill="#27ae60" opacity="0.4"/>
    <circle cx="8" cy="-15" r="3" fill="#27ae60" opacity="0.4"/>
  </g>
  <text x="85" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">Champignons</text>
  <text x="85" y="252" text-anchor="middle" font-size="9" fill="#7f8c8d">Eucaryotes</text>
  <!-- Characteristics -->
  <text x="150" y="232" font-size="9" fill="#2c3e50">Eucaryotes, levures</text>
  <text x="150" y="245" font-size="9" fill="#2c3e50">ou moisissures</text>
  <text x="150" y="258" font-size="9" fill="#2c3e50">Spores tres resistantes</text>
  <!-- Examples -->
  <text x="310" y="232" font-size="9" fill="#2c3e50" font-weight="bold">Candida albicans</text>
  <text x="310" y="245" font-size="9" fill="#2c3e50">Dermatophytes</text>
  <text x="310" y="258" font-size="9" fill="#2c3e50">Aspergillus</text>
  <!-- Resistance -->
  <text x="510" y="232" font-size="9" fill="#2c3e50">Moderement</text>
  <text x="510" y="245" font-size="9" fill="#2c3e50">resistants</text>
  <text x="510" y="258" font-size="9" fill="#2c3e50">Spores plus resistantes</text>

  <!-- Row 4: Parasites -->
  <rect x="20" y="272" width="660" height="58" rx="0" fill="#ebf5fb" stroke="#d5dbdb" stroke-width="1"/>
  <!-- Icon -->
  <g transform="translate(50,295)">
    <ellipse cx="0" cy="0" rx="16" ry="7" fill="#3498db" opacity="0.3" stroke="#3498db" stroke-width="1.5"/>
    <ellipse cx="-5" cy="0" rx="4" ry="3" fill="#3498db" opacity="0.5"/>
    <!-- Cilia -->
    <line x1="-12" y1="-5" x2="-14" y2="-9" stroke="#3498db" stroke-width="0.8"/>
    <line x1="-6" y1="-6" x2="-7" y2="-10" stroke="#3498db" stroke-width="0.8"/>
    <line x1="0" y1="-7" x2="0" y2="-11" stroke="#3498db" stroke-width="0.8"/>
    <line x1="6" y1="-6" x2="7" y2="-10" stroke="#3498db" stroke-width="0.8"/>
    <line x1="12" y1="-5" x2="14" y2="-9" stroke="#3498db" stroke-width="0.8"/>
  </g>
  <text x="85" y="298" text-anchor="middle" font-size="12" font-weight="bold" fill="#3498db">Parasites</text>
  <text x="85" y="312" text-anchor="middle" font-size="9" fill="#7f8c8d">Eucaryotes</text>
  <!-- Characteristics -->
  <text x="150" y="292" font-size="9" fill="#2c3e50">Vivent aux depens</text>
  <text x="150" y="305" font-size="9" fill="#2c3e50">d'un hote</text>
  <text x="150" y="318" font-size="9" fill="#2c3e50">Uni- ou pluricellulaires</text>
  <!-- Examples -->
  <text x="310" y="292" font-size="9" fill="#2c3e50">Gale (Sarcoptes)</text>
  <text x="310" y="305" font-size="9" fill="#2c3e50">Poux</text>
  <text x="310" y="318" font-size="9" fill="#2c3e50">Toxoplasma gondii</text>
  <!-- Resistance -->
  <text x="510" y="292" font-size="9" fill="#2c3e50">Variable</text>
  <text x="510" y="305" font-size="9" fill="#2c3e50">Formes kystiques</text>
  <text x="510" y="318" font-size="9" fill="#2c3e50">tres resistantes</text>

  <!-- Row 5: Prions -->
  <rect x="20" y="332" width="660" height="58" rx="0" fill="#f5eef8" stroke="#d5dbdb" stroke-width="1"/>
  <rect x="20" y="385" width="660" height="5" rx="0 0 6 6" fill="#f5eef8" stroke="none"/>
  <!-- Icon -->
  <g transform="translate(50,355)">
    <path d="M-10,8 Q-5,-8 0,5 Q5,-10 10,8 Q5,2 0,10 Q-5,2 -10,8" fill="#8e44ad" opacity="0.4" stroke="#8e44ad" stroke-width="1.5"/>
  </g>
  <text x="85" y="358" text-anchor="middle" font-size="12" font-weight="bold" fill="#8e44ad">Prions</text>
  <text x="85" y="372" text-anchor="middle" font-size="9" fill="#7f8c8d">Proteines</text>
  <!-- Characteristics -->
  <text x="150" y="352" font-size="9" fill="#2c3e50">Proteines mal repliees</text>
  <text x="150" y="365" font-size="9" fill="#2c3e50">Pas d'acide nucleique</text>
  <text x="150" y="378" font-size="9" fill="#2c3e50">Incurables</text>
  <!-- Examples -->
  <text x="310" y="352" font-size="9" fill="#2c3e50">Maladie de</text>
  <text x="310" y="365" font-size="9" fill="#2c3e50">Creutzfeldt-Jakob</text>
  <text x="310" y="378" font-size="9" fill="#7f8c8d">(risque theorique)</text>
  <!-- Resistance -->
  <text x="510" y="352" font-size="9" fill="#e74c3c" font-weight="bold">Extremement</text>
  <text x="510" y="365" font-size="9" fill="#e74c3c" font-weight="bold">resistants</text>
  <text x="510" y="378" font-size="9" fill="#2c3e50">Resistent a 134 °C</text>

  <!-- Column lines -->
  <line x1="140" y1="92" x2="140" y2="390" stroke="#d5dbdb" stroke-width="1"/>
  <line x1="300" y1="92" x2="300" y2="390" stroke="#d5dbdb" stroke-width="1"/>
  <line x1="500" y1="92" x2="500" y2="390" stroke="#d5dbdb" stroke-width="1"/>

  <!-- Bottom border -->
  <rect x="20" y="388" width="660" height="2" rx="1" fill="#1a5276"/>
</svg>