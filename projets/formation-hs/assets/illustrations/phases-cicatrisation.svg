<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a5276"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a5276">Les 4 phases de la cicatrisation</text>

  <!-- Timeline bar -->
  <rect x="30" y="235" width="640" height="4" rx="2" fill="#d5dbdb"/>

  <!-- Timeline markers -->
  <text x="30" y="260" font-size="10" fill="#7f8c8d" text-anchor="middle">J0</text>
  <text x="120" y="260" font-size="10" fill="#7f8c8d" text-anchor="middle">J1</text>
  <text x="280" y="260" font-size="10" fill="#7f8c8d" text-anchor="middle">J5</text>
  <text x="460" y="260" font-size="10" fill="#7f8c8d" text-anchor="middle">J21</text>
  <text x="645" y="260" font-size="10" fill="#7f8c8d" text-anchor="middle">J90+</text>

  <!-- Phase 1: Hémostase -->
  <rect x="30" y="55" width="130" height="160" rx="10" fill="#e74c3c" opacity="0.12" stroke="#e74c3c" stroke-width="2"/>
  <rect x="30" y="55" width="130" height="36" rx="10" fill="#e74c3c"/>
  <rect x="30" y="75" width="130" height="16" fill="#e74c3c"/>
  <text x="95" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Phase 1</text>
  <text x="95" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">Hemostase</text>
  <text x="95" y="125" text-anchor="middle" font-size="10" fill="#2c3e50">Coagulation</text>
  <text x="95" y="140" text-anchor="middle" font-size="10" fill="#2c3e50">Agregation</text>
  <text x="95" y="155" text-anchor="middle" font-size="10" fill="#2c3e50">plaquettaire</text>
  <text x="95" y="175" text-anchor="middle" font-size="10" fill="#2c3e50">Formation</text>
  <text x="95" y="190" text-anchor="middle" font-size="10" fill="#2c3e50">du caillot</text>
  <text x="95" y="205" text-anchor="middle" font-size="9" font-weight="bold" fill="#7f8c8d">J0 - J1</text>
  <!-- Timeline segment -->
  <rect x="30" y="232" width="90" height="10" rx="2" fill="#e74c3c" opacity="0.7"/>

  <!-- Arrow 1→2 -->
  <line x1="165" y1="135" x2="185" y2="135" stroke="#1a5276" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2: Inflammation -->
  <rect x="190" y="55" width="140" height="160" rx="10" fill="#f39c12" opacity="0.12" stroke="#f39c12" stroke-width="2"/>
  <rect x="190" y="55" width="140" height="36" rx="10" fill="#f39c12"/>
  <rect x="190" y="75" width="140" height="16" fill="#f39c12"/>
  <text x="260" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Phase 2</text>
  <text x="260" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#f39c12">Inflammation</text>
  <text x="260" y="125" text-anchor="middle" font-size="10" fill="#2c3e50">Rougeur, chaleur</text>
  <text x="260" y="140" text-anchor="middle" font-size="10" fill="#2c3e50">oedeme, douleur</text>
  <text x="260" y="160" text-anchor="middle" font-size="10" fill="#2c3e50">Afflux de</text>
  <text x="260" y="175" text-anchor="middle" font-size="10" fill="#2c3e50">leucocytes</text>
  <text x="260" y="195" text-anchor="middle" font-size="10" fill="#2c3e50">Detersion</text>
  <text x="260" y="205" text-anchor="middle" font-size="9" font-weight="bold" fill="#7f8c8d">J1 - J5</text>
  <!-- Timeline segment -->
  <rect x="120" y="232" width="160" height="10" rx="2" fill="#f39c12" opacity="0.7"/>

  <!-- Arrow 2→3 -->
  <line x1="335" y1="135" x2="355" y2="135" stroke="#1a5276" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3: Prolifération -->
  <rect x="360" y="55" width="140" height="160" rx="10" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="2"/>
  <rect x="360" y="55" width="140" height="36" rx="10" fill="#27ae60"/>
  <rect x="360" y="75" width="140" height="16" fill="#27ae60"/>
  <text x="430" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Phase 3</text>
  <text x="430" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">Proliferation</text>
  <text x="430" y="125" text-anchor="middle" font-size="10" fill="#2c3e50">Bourgeonnement</text>
  <text x="430" y="140" text-anchor="middle" font-size="10" fill="#2c3e50">Angiogenese</text>
  <text x="430" y="160" text-anchor="middle" font-size="10" fill="#2c3e50">Tissu de</text>
  <text x="430" y="175" text-anchor="middle" font-size="10" fill="#2c3e50">granulation</text>
  <text x="430" y="195" text-anchor="middle" font-size="10" fill="#2c3e50">Epithelialisation</text>
  <text x="430" y="205" text-anchor="middle" font-size="9" font-weight="bold" fill="#7f8c8d">J5 - J21</text>
  <!-- Timeline segment -->
  <rect x="280" y="232" width="180" height="10" rx="2" fill="#27ae60" opacity="0.7"/>

  <!-- Arrow 3→4 -->
  <line x1="505" y1="135" x2="525" y2="135" stroke="#1a5276" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 4: Remodelage -->
  <rect x="530" y="55" width="140" height="160" rx="10" fill="#1a5276" opacity="0.12" stroke="#1a5276" stroke-width="2"/>
  <rect x="530" y="55" width="140" height="36" rx="10" fill="#1a5276"/>
  <rect x="530" y="75" width="140" height="16" fill="#1a5276"/>
  <text x="600" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Phase 4</text>
  <text x="600" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a5276">Remodelage</text>
  <text x="600" y="125" text-anchor="middle" font-size="10" fill="#2c3e50">Maturation</text>
  <text x="600" y="140" text-anchor="middle" font-size="10" fill="#2c3e50">du collagene</text>
  <text x="600" y="160" text-anchor="middle" font-size="10" fill="#2c3e50">Reorganisation</text>
  <text x="600" y="175" text-anchor="middle" font-size="10" fill="#2c3e50">tissulaire</text>
  <text x="600" y="195" text-anchor="middle" font-size="10" fill="#2c3e50">Cicatrice definitive</text>
  <text x="600" y="205" text-anchor="middle" font-size="9" font-weight="bold" fill="#7f8c8d">J21+</text>
  <!-- Timeline segment -->
  <rect x="460" y="232" width="210" height="10" rx="2" fill="#1a5276" opacity="0.7"/>

  <!-- Bottom note -->
  <text x="350" y="288" text-anchor="middle" font-size="11" fill="#7f8c8d" font-style="italic">Durees indicatives — la cicatrisation varie selon l'individu et la zone tatouee/percee</text>
</svg>